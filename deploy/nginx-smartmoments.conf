server {
    server_name smartmoments.fr www.smartmoments.fr;

    # Gzip compression for faster page loads
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Next.js static assets - immutable cache 1 year
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3005;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Next.js optimized images - cache 30 days
    location /_next/image {
        proxy_pass http://127.0.0.1:3005;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        access_log off;
    }

    # Static files in public folder
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|css|js)$ {
        proxy_pass http://127.0.0.1:3005;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # HTML pages - short cache with revalidation for SEO freshness
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache HTML pages for 1 hour, serve stale while revalidating
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }

    listen 80;
}
